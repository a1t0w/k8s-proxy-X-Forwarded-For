worker_processes 1;
events { worker_connections 1024; }

http {
    server {
        listen 80;

        location /chain {
            set $xff "$http_x_forwarded_for, $server_addr";
            proxy_set_header X-Forwarded-For "$xff";
            proxy_pass http://nginx3-svc/chain;
        }

        location /direct {
            proxy_set_header X-Forwarded-For "";
            proxy_set_header X-Forwarded-For "$remote_addr, $server_addr";
            proxy_pass http://nginx-web-svc:8080;
        }

        location / {
            set $xff "$http_x_forwarded_for, $server_addr";
            proxy_set_header X-Forwarded-For "$xff";
            proxy_pass http://nginx3-svc;
        }
    }
}
